<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お腹やせマシン・マネージャー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f2424;
      --surface:  #1a3a3a;
      --surface2: #1f4545;
      --accent:   #2ecc71;
      --accent2:  #27ae60;
      --text:     #e8f5e9;
      --muted:    #7da99a;
      --danger:   #e74c3c;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, #0d2e2e 0%, #1a4a3a 100%);
      padding: 20px 16px 14px;
      text-align: center;
      border-bottom: 2px solid var(--accent);
    }
    .app-header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--accent);
    }
    .app-header .today-date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Tabs ── */
    .tab-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid #0f2424;
    }
    .tab-btn {
      flex: 1;
      padding: 13px 8px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, border-bottom 0.2s;
      border-bottom: 3px solid transparent;
      letter-spacing: 0.03em;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom: 3px solid var(--accent);
    }

    /* ── Container ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 14px;
    }

    /* ── Tab Panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Progress Section ── */
    .progress-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .progress-pct {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
    }
    .progress-bar-track {
      background: #0f2424;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .motivation-msg {
      margin-top: 10px;
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 700;
      min-height: 1.2em;
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* ── Rest Day ── */
    .rest-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
    }
    .rest-card .rest-icon { font-size: 3rem; margin-bottom: 12px; }
    .rest-card h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 8px; }
    .rest-card p  { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }

    /* ── Task Cards ── */
    .task-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

    .task-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      border: 2px solid transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .task-card:active { transform: scale(0.98); }
    .task-card.checked {
      background: #1a3a2a;
      border-color: var(--accent);
    }

    /* Custom checkbox */
    .task-check {
      width: 26px;
      height: 26px;
      min-width: 26px;
      border-radius: 8px;
      border: 2px solid var(--muted);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .task-card.checked .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check-icon {
      display: none;
      font-size: 0.9rem;
      color: #fff;
      font-weight: 900;
    }
    .task-card.checked .task-check-icon { display: block; }

    .task-info { flex: 1; }
    .task-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .task-card.checked .task-name {
      color: var(--accent);
      text-decoration: line-through;
      text-decoration-color: var(--accent2);
    }
    .task-vol {
      display: inline-block;
      margin-top: 3px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #0f2424;
      background: var(--accent);
      border-radius: 99px;
      padding: 1px 9px;
    }
    .task-desc {
      margin-top: 5px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .task-machine-icon {
      font-size: 1.8rem;
      min-width: 36px;
      text-align: center;
    }

    /* ── Complete Button ── */
    .complete-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 18px rgba(46,204,113,0.35);
    }
    .complete-btn:active { transform: scale(0.98); opacity: 0.9; }
    .complete-btn:disabled {
      background: var(--surface2);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 24px;
      border-radius: 99px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── History Tab ── */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .history-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .clear-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1.5px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .clear-btn:hover { background: var(--danger); color: #fff; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 2.8rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    .history-list { display: flex; flex-direction: column; gap: 12px; }

    .history-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .history-card-date {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .history-card-date::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .history-badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .history-badge {
      background: #0f2424;
      border: 1.5px solid var(--accent2);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 99px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .history-badge::before { content: '✓ '; color: var(--accent); }
    .history-pct-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 800;
      border-radius: 99px;
      padding: 3px 10px;
      align-self: center;
    }

    /* ── Section divider ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* ── Timer ── */
    .timer-wrap {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .timer-ring-wrap {
      position: relative;
      width: 54px;
      height: 54px;
      flex-shrink: 0;
    }
    .timer-ring-wrap svg {
      transform: rotate(-90deg);
      width: 54px;
      height: 54px;
    }
    .timer-ring-bg { fill: none; stroke: #0f2424; stroke-width: 4; }
    .timer-ring-fg {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear;
    }
    .timer-ring-fg.urgent { stroke: #e74c3c; }
    .timer-display {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .timer-display.urgent { color: #e74c3c; }
    .timer-display.finished { color: var(--accent); font-size: 0.6rem; }
    .timer-controls {
      display: flex;
      gap: 6px;
      flex: 1;
      align-items: center;
    }
    .timer-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .timer-btn:active { transform: scale(0.95); }
    .timer-btn.start  { background: var(--accent); color: #0f2424; }
    .timer-btn.pause  { background: #e6a817; color: #0f2424; }
    .timer-btn.reset  { background: var(--surface2); color: var(--muted); }
    .timer-btn.done   { background: #2ecc71; color: #fff; font-size: 0.75rem; }
    .timer-status {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .timer-status.running { color: var(--accent); }
    .timer-status.finished { color: #2ecc71; }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(46,204,113,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(46,204,113,0); }
      100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
    }
    .timer-ring-wrap.running { animation: pulse-ring 1.5s infinite; border-radius: 50%; }

    @media (max-width: 400px) {
      .app-header h1 { font-size: 1.1rem; }
      .task-name { font-size: 0.93rem; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>🏋️ お腹やせマシン・マネージャー</h1>
  <div class="today-date" id="headerDate"></div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" data-tab="menu">今日のメニュー</button>
  <button class="tab-btn" data-tab="history">達成履歴・ログ</button>
</nav>

<main class="container">
  <!-- ===== TODAY'S MENU TAB ===== -->
  <section class="tab-panel active" id="tab-menu">

    <div class="progress-section" id="progressSection" style="display:none;">
      <div class="progress-header">
        <span class="progress-label">本日の達成率</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="motivation-msg" id="motivationMsg"></div>
    </div>

    <p class="section-label" id="dayLabel"></p>

    <div id="menuContent"></div>

  </section>

  <!-- ===== HISTORY TAB ===== -->
  <section class="tab-panel" id="tab-history">
    <div class="history-header">
      <span class="history-title">📋 トレーニング履歴</span>
      <button class="clear-btn" id="clearBtn">履歴をクリア</button>
    </div>
    <div id="historyContent"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
  /* ===================================================
     黄金スケジュールデータ
  =================================================== */
  const MACHINE_ICON = {
    "乗馬マシン":         "🏇",
    "ウォーキングマシン": "🚶",
    "3Dウェーブマシン":   "〰️"
  };

  const SCHEDULE = {
    1: [ // 月：週はじめ・体幹覚醒日（合計50分）
      { name: "乗馬マシン",         vol: "10分", desc: "週はじめは短めに。骨盤を動かして体幹スイッチをON" },
      { name: "ウォーキングマシン", vol: "30分", desc: "しっかり有酸素でお腹の脂肪燃焼を起動。ゆっくりペースでOK" },
      { name: "3Dウェーブマシン",   vol: "10分", desc: "有酸素直後の振動で血流MAX。老廃物をリンパへ流す" }
    ],
    2: [ // 火：インナーマッスル集中日（合計35分）
      { name: "乗馬マシン",         vol: "15分", desc: "骨盤の前後・左右をフルに使い、腹横筋・多裂筋を強化" },
      { name: "3Dウェーブマシン",   vol: "10分", desc: "乗馬後の体幹をさらに刺激。お腹周りをダイレクトに揺らす" },
      { name: "ウォーキングマシン", vol: "10分", desc: "軽めウォークでクールダウン。乳酸を流して翌日に疲れを残さない" }
    ],
    3: null, // 水：完全レスト（超回復日）
    4: [ // 木：有酸素強化日（合計45分）
      { name: "ウォーキングマシン", vol: "30分", desc: "傾斜3〜5%推奨。脂肪燃焼ゾーン(最大心拍数の60〜70%)をキープ" },
      { name: "乗馬マシン",         vol: "5分",  desc: "歩いた後の体幹仕上げ。短時間でも骨盤安定効果は十分" },
      { name: "3Dウェーブマシン",   vol: "10分", desc: "有酸素後のゴールデンタイム。下半身のむくみをリセット" }
    ],
    5: [ // 金：週末前・フル引き締め日（合計50分）
      { name: "乗馬マシン",         vol: "15分", desc: "週で一番しっかり乗る日。体幹・インナーマッスルを総動員" },
      { name: "ウォーキングマシン", vol: "25分", desc: "脂肪燃焼を加速。金曜は少しペースを上げてみよう" },
      { name: "3Dウェーブマシン",   vol: "10分", desc: "週の疲れを振動で流す。血行促進でリカバリーも兼ねる" }
    ],
    6: [ // 土：週末・リカバリー引き締め日（合計35分）
      { name: "ウォーキングマシン", vol: "20分", desc: "週末のリフレッシュウォーク。景色を楽しむ気分で軽やかに" },
      { name: "乗馬マシン",         vol: "10分", desc: "過負荷にならない程度に体幹をキープ。週の締めくくり" },
      { name: "3Dウェーブマシン",   vol: "5分",  desc: "週ラストの仕上げ振動。短時間でも継続が最大の効果" }
    ],
    0: [ // 日：軽回復日（合計20分）
      { name: "3Dウェーブマシン",   vol: "10分", desc: "日曜はこれだけでOK。全身の血流を整えて翌週に備える" },
      { name: "ウォーキングマシン", vol: "10分", desc: "ゆっくりウォークで関節をほぐす。翌週月曜への準備運動" }
    ]
  };

  const DAY_NAMES = ["日", "月", "火", "水", "木", "金", "土"];

  const MOTIVATION = [
    { min: 0,   max: 0,   msg: "さあ、今日もはじめよう！💪" },
    { min: 1,   max: 49,  msg: "いい調子！このまま続けよう🔥" },
    { min: 50,  max: 99,  msg: "もう少し！ゴールが見えてきた⚡" },
    { min: 100, max: 100, msg: "完璧です！今日も最高のトレーニング🎉" }
  ];

  /* ===================================================
     ユーティリティ
  =================================================== */
  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateJP(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${y}年${m}月${d}日`;
  }

  function getMotivationMsg(pct) {
    for (const m of MOTIVATION) {
      if (pct >= m.min && pct <= m.max) return m.msg;
    }
    return "";
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  /* ===================================================
     localStorage キー
  =================================================== */
  const LS_TODAY_KEY  = 'waist_today';   // { date, checks: [bool, ...] }
  const LS_HISTORY    = 'waist_history'; // [{date, tasks:[{name,vol}], pct}]

  /* ===================================================
     今日のメニュー レンダリング
  =================================================== */
  let todayTasks = [];
  let todayChecks = [];

  function renderMenu() {
    const today = new Date();
    const todayStr = getTodayStr();
    const dow = today.getDay();
    const dayName = DAY_NAMES[dow];

    document.getElementById('headerDate').textContent =
      `${formatDateJP(todayStr)}（${dayName}曜日）`;
    const tasks0 = SCHEDULE[dow];
    const totalMin = tasks0 ? tasks0.reduce((s, t) => s + parseInt(t.vol), 0) : 0;
    document.getElementById('dayLabel').textContent =
      tasks0 ? `${dayName}曜日のメニュー　合計 ${totalMin}分` : `${dayName}曜日のメニュー`;

    const tasks = SCHEDULE[dow];
    const menuEl = document.getElementById('menuContent');
    const progressSec = document.getElementById('progressSection');

    if (!tasks) {
      // レスト日
      progressSec.style.display = 'none';
      menuEl.innerHTML = `
        <div class="rest-card">
          <div class="rest-icon">🌿</div>
          <h2>本日はレスト（お休み）です！</h2>
          <p>今日はしっかり身体を休めましょう。<br>軽いストレッチやマッサージがおすすめです。</p>
        </div>`;
      return;
    }

    progressSec.style.display = 'block';
    todayTasks = tasks;

    // セッション復元
    const saved = JSON.parse(localStorage.getItem(LS_TODAY_KEY) || 'null');
    if (saved && saved.date === todayStr && Array.isArray(saved.checks) && saved.checks.length === tasks.length) {
      todayChecks = saved.checks;
    } else {
      todayChecks = tasks.map(() => false);
    }

    // タスクカード生成
    let html = '<div class="task-list" id="taskList">';
    tasks.forEach((t, i) => {
      const icon = MACHINE_ICON[t.name] || '🏋️';
      const checked = todayChecks[i];
      const mins = parseInt(t.vol);
      const r = 23;
      const circ = Math.round(2 * Math.PI * r);
      html += `
        <div class="task-card ${checked ? 'checked' : ''}" data-idx="${i}">
          <div class="task-machine-icon" onclick="toggleTask(${i})">${icon}</div>
          <div class="task-info" style="flex:1;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div class="task-name" onclick="toggleTask(${i})">${t.name}</div>
              <div class="task-check" onclick="toggleTask(${i})">
                <span class="task-check-icon">✓</span>
              </div>
            </div>
            <span class="task-vol">${t.vol}</span>
            <div class="task-desc">${t.desc}</div>
            <div class="timer-wrap" id="timerWrap_${i}">
              <div class="timer-ring-wrap" id="timerRing_${i}">
                <svg viewBox="0 0 54 54">
                  <circle class="timer-ring-bg" cx="27" cy="27" r="${r}"/>
                  <circle class="timer-ring-fg" id="timerFg_${i}" cx="27" cy="27" r="${r}"
                    stroke-dasharray="${circ}" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-display" id="timerDisp_${i}">${String(mins).padStart(2,'0')}:00</div>
              </div>
              <div class="timer-controls">
                <button class="timer-btn start" id="timerStartBtn_${i}" onclick="timerStart(${i})">▶ スタート</button>
                <button class="timer-btn reset" id="timerResetBtn_${i}" onclick="timerReset(${i})" style="display:none;">↺</button>
                <span class="timer-status" id="timerStatus_${i}">目標 ${t.vol}</span>
              </div>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';

    html += `
      <button class="complete-btn" id="completeBtn" onclick="completeDay()">
        今日のトレーニングを完了する 💾
      </button>`;

    menuEl.innerHTML = html;
    updateProgress();
  }

  function toggleTask(idx) {
    todayChecks[idx] = !todayChecks[idx];

    // DOM更新
    const card = document.querySelector(`.task-card[data-idx="${idx}"]`);
    if (card) card.classList.toggle('checked', todayChecks[idx]);

    // localStorageへ一時保存
    localStorage.setItem(LS_TODAY_KEY, JSON.stringify({
      date: getTodayStr(),
      checks: todayChecks
    }));

    updateProgress();
  }

  function updateProgress() {
    const total   = todayChecks.length;
    const done    = todayChecks.filter(Boolean).length;
    const pct     = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('progressPct').textContent  = `${pct}%`;
    document.getElementById('progressFill').style.width = `${pct}%`;
    document.getElementById('motivationMsg').textContent = getMotivationMsg(pct);

    const btn = document.getElementById('completeBtn');
    if (btn) btn.disabled = done === 0;
  }

  function completeDay() {
    const todayStr = getTodayStr();
    const done = todayChecks.reduce((acc, c, i) => {
      if (c) acc.push({ name: todayTasks[i].name, vol: todayTasks[i].vol });
      return acc;
    }, []);

    if (done.length === 0) return;

    const pct = Math.round((done.length / todayTasks.length) * 100);

    const history = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]');

    // 同日の重複チェック：あれば上書き
    const existIdx = history.findIndex(h => h.date === todayStr);
    const entry = { date: todayStr, tasks: done, pct };
    if (existIdx >= 0) {
      history[existIdx] = entry;
    } else {
      history.unshift(entry);
    }

    localStorage.setItem(LS_HISTORY, JSON.stringify(history));
    showToast('✅ 本日の実績を保存しました！');

    // 履歴タブへ遷移
    setTimeout(() => switchTab('history'), 700);
  }

  /* ===================================================
     履歴タブ レンダリング
  =================================================== */
  function renderHistory() {
    const history = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]');
    const el = document.getElementById('historyContent');

    if (history.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>まだ履歴がありません。<br>今日のトレーニングを完了してみよう！</p>
        </div>`;
      return;
    }

    // 降順ソート（日付文字列で十分）
    const sorted = [...history].sort((a, b) => b.date.localeCompare(a.date));

    let html = '<div class="history-list">';
    sorted.forEach(h => {
      const badges = h.tasks.map(t =>
        `<span class="history-badge">${t.name} ${t.vol}</span>`
      ).join('');
      html += `
        <div class="history-card">
          <div class="history-card-date">
            ${formatDateJP(h.date)}
            <span class="history-pct-badge">${h.pct}%</span>
          </div>
          <div class="history-badges">${badges}</div>
        </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
  }

  /* ===================================================
     ブラウザ通知パーミッション
  =================================================== */
  let notifPermission = Notification.permission;

  async function requestNotifPermission() {
    if (notifPermission === 'granted') return true;
    if (notifPermission === 'denied') return false;
    const result = await Notification.requestPermission();
    notifPermission = result;
    return result === 'granted';
  }

  function sendNotif(title, body) {
    if (notifPermission !== 'granted') return;
    try {
      const n = new Notification(title, {
        body,
        icon: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/72x72/1f3cb.png',
        badge: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14/assets/72x72/1f3cb.png',
        vibrate: [200, 100, 200],
        tag: `waist-timer-${Date.now()}`
      });
      n.onclick = () => { window.focus(); n.close(); };
    } catch(e) {}
  }

  /* ===================================================
     タイマー管理（開始時刻記録方式 + Notification API）
     state: 'idle' | 'running' | 'paused' | 'done'
     startedAt: Date.now() ms（running時のみ）
     pausedRemaining: ポーズ時点の残り秒数
  =================================================== */
  const timers = {};
  const LS_TIMERS = 'waist_timers'; // バックグラウンド復元用

  function volToSec(vol) {
    const m = parseInt(vol);
    return isNaN(m) ? 600 : m * 60;
  }

  function fmtTime(sec) {
    const s = Math.max(0, sec);
    return `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  }

  function timerGetRemaining(tm) {
    if (tm.state === 'running') {
      const elapsed = Math.floor((Date.now() - tm.startedAt) / 1000);
      return Math.max(0, tm.pausedRemaining - elapsed);
    }
    return tm.pausedRemaining;
  }

  function timerSavePersist() {
    const data = {};
    Object.entries(timers).forEach(([idx, tm]) => {
      data[idx] = {
        state: tm.state,
        total: tm.total,
        pausedRemaining: timerGetRemaining(tm),
        startedAt: tm.startedAt,
        notifTimeout: null
      };
    });
    localStorage.setItem(LS_TIMERS, JSON.stringify(data));
  }

  function timerStart(idx) {
    requestNotifPermission();
    const t = todayTasks[idx];
    if (!timers[idx]) {
      timers[idx] = {
        total: volToSec(t.vol),
        pausedRemaining: volToSec(t.vol),
        startedAt: null,
        state: 'idle',
        interval: null,
        notifTimeout: null
      };
    }
    const tm = timers[idx];
    if (tm.state === 'done') return;

    if (tm.state === 'running') {
      // ポーズ
      tm.pausedRemaining = timerGetRemaining(tm);
      tm.startedAt = null;
      clearInterval(tm.interval);
      clearTimeout(tm.notifTimeout);
      tm.state = 'paused';
      timerSavePersist();
      document.getElementById(`timerStartBtn_${idx}`).textContent = '▶ 再開';
      document.getElementById(`timerStartBtn_${idx}`).className = 'timer-btn start';
      document.getElementById(`timerRing_${idx}`).classList.remove('running');
      document.getElementById(`timerStatus_${idx}`).textContent = '一時停止中';
      document.getElementById(`timerStatus_${idx}`).className = 'timer-status';
      return;
    }

    // スタート / 再開
    tm.startedAt = Date.now();
    tm.state = 'running';

    // 通知タイマーをセット（別タブでも発火）
    clearTimeout(tm.notifTimeout);
    tm.notifTimeout = setTimeout(() => {
      sendNotif(
        `🎉 ${t.name} 完了！`,
        `${t.vol}のトレーニングが終わりました。お疲れさまでした！`
      );
    }, tm.pausedRemaining * 1000);

    timerSavePersist();

    const startBtn = document.getElementById(`timerStartBtn_${idx}`);
    startBtn.textContent = '⏸ ポーズ';
    startBtn.className = 'timer-btn pause';
    document.getElementById(`timerResetBtn_${idx}`).style.display = 'inline-block';
    document.getElementById(`timerRing_${idx}`).classList.add('running');
    const statusEl = document.getElementById(`timerStatus_${idx}`);
    statusEl.textContent = '計測中...';
    statusEl.className = 'timer-status running';

    clearInterval(tm.interval);
    tm.interval = setInterval(() => {
      const rem = timerGetRemaining(tm);
      timerUpdateUI(idx, rem);
      if (rem <= 0) {
        clearInterval(tm.interval);
        tm.state = 'done';
        timerSavePersist();
        timerFinish(idx);
      }
    }, 500); // 500msポーリングで精度向上
  }

  function timerReset(idx) {
    if (!timers[idx]) return;
    clearInterval(timers[idx].interval);
    clearTimeout(timers[idx].notifTimeout);
    timers[idx].pausedRemaining = timers[idx].total;
    timers[idx].startedAt = null;
    timers[idx].state = 'idle';
    timerSavePersist();

    const startBtn = document.getElementById(`timerStartBtn_${idx}`);
    startBtn.textContent = '▶ スタート';
    startBtn.className = 'timer-btn start';
    startBtn.onclick = () => timerStart(idx);
    document.getElementById(`timerResetBtn_${idx}`).style.display = 'none';
    document.getElementById(`timerRing_${idx}`).classList.remove('running');
    const dispEl = document.getElementById(`timerDisp_${idx}`);
    dispEl.textContent = fmtTime(timers[idx].total);
    dispEl.className = 'timer-display';
    const fgEl = document.getElementById(`timerFg_${idx}`);
    fgEl.style.strokeDashoffset = '0';
    fgEl.className = 'timer-ring-fg';
    const statusEl = document.getElementById(`timerStatus_${idx}`);
    statusEl.textContent = `目標 ${todayTasks[idx].vol}`;
    statusEl.className = 'timer-status';
  }

  function timerUpdateUI(idx, rem) {
    const tm = timers[idx];
    const remaining = rem !== undefined ? rem : timerGetRemaining(tm);
    const dispEl = document.getElementById(`timerDisp_${idx}`);
    const fgEl   = document.getElementById(`timerFg_${idx}`);
    if (!dispEl || !fgEl) return;
    const r = 23;
    const circ = 2 * Math.PI * r;
    const ratio = remaining / tm.total;
    fgEl.style.strokeDashoffset = String(circ * (1 - ratio));
    dispEl.textContent = fmtTime(remaining);
    if (remaining <= 30) {
      dispEl.className = 'timer-display urgent';
      fgEl.className   = 'timer-ring-fg urgent';
    }
  }

  function timerFinish(idx) {
    const ringEl = document.getElementById(`timerRing_${idx}`);
    if (ringEl) ringEl.classList.remove('running');
    const dispEl = document.getElementById(`timerDisp_${idx}`);
    if (dispEl) { dispEl.textContent = '完了！'; dispEl.className = 'timer-display finished'; }
    const startBtn = document.getElementById(`timerStartBtn_${idx}`);
    if (startBtn) { startBtn.textContent = '✓ 完了'; startBtn.className = 'timer-btn done'; startBtn.onclick = null; }
    const statusEl = document.getElementById(`timerStatus_${idx}`);
    if (statusEl) { statusEl.textContent = 'タイマー終了！'; statusEl.className = 'timer-status finished'; }
    // 自動チェック
    if (!todayChecks[idx]) toggleTask(idx);
    // バイブレーション
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    // 通知音（Web Audio API）
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [880, 1100, 1320].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.18);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.4);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.4);
      });
    } catch(e) {}
    showToast(`🎉 ${todayTasks[idx].name} 完了！`);
  }

  /* ===================================================
     ページ復帰時：実行中タイマーを復元
  =================================================== */
  function timerRestoreAll() {
    const saved = JSON.parse(localStorage.getItem(LS_TIMERS) || '{}');
    Object.entries(saved).forEach(([idxStr, data]) => {
      const idx = parseInt(idxStr);
      if (!todayTasks[idx]) return;
      if (data.state === 'done') return;

      const elapsed = data.startedAt
        ? Math.floor((Date.now() - data.startedAt) / 1000)
        : 0;
      const remaining = Math.max(0, data.pausedRemaining - elapsed);

      timers[idx] = {
        total: data.total,
        pausedRemaining: remaining,
        startedAt: data.state === 'running' ? Date.now() : null,
        state: remaining <= 0 ? 'done' : data.state,
        interval: null,
        notifTimeout: null
      };

      if (remaining <= 0) {
        timerFinish(idx);
        return;
      }

      // UI復元
      timerUpdateUI(idx, remaining);
      document.getElementById(`timerResetBtn_${idx}`).style.display = 'inline-block';

      if (data.state === 'running') {
        // 通知タイマー再設定
        timers[idx].notifTimeout = setTimeout(() => {
          sendNotif(
            `🎉 ${todayTasks[idx].name} 完了！`,
            `${todayTasks[idx].vol}のトレーニングが終わりました。お疲れさまでした！`
          );
        }, remaining * 1000);

        timers[idx].interval = setInterval(() => {
          const rem = timerGetRemaining(timers[idx]);
          timerUpdateUI(idx, rem);
          if (rem <= 0) {
            clearInterval(timers[idx].interval);
            timers[idx].state = 'done';
            timerSavePersist();
            timerFinish(idx);
          }
        }, 500);

        const startBtn = document.getElementById(`timerStartBtn_${idx}`);
        if (startBtn) { startBtn.textContent = '⏸ ポーズ'; startBtn.className = 'timer-btn pause'; }
        const ringEl = document.getElementById(`timerRing_${idx}`);
        if (ringEl) ringEl.classList.add('running');
        const statusEl = document.getElementById(`timerStatus_${idx}`);
        if (statusEl) { statusEl.textContent = '計測中...'; statusEl.className = 'timer-status running'; }
      } else {
        const startBtn = document.getElementById(`timerStartBtn_${idx}`);
        if (startBtn) { startBtn.textContent = '▶ 再開'; startBtn.className = 'timer-btn start'; }
        const statusEl = document.getElementById(`timerStatus_${idx}`);
        if (statusEl) { statusEl.textContent = '一時停止中'; statusEl.className = 'timer-status'; }
      }
    });
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      Object.keys(timers).forEach(idx => {
        const tm = timers[parseInt(idx)];
        if (tm && tm.state === 'running') {
          const rem = timerGetRemaining(tm);
          timerUpdateUI(parseInt(idx), rem);
          if (rem <= 0) {
            clearInterval(tm.interval);
            tm.state = 'done';
            timerFinish(parseInt(idx));
          }
        }
      });
    }
  });

  /* ===================================================
     クリアボタン
  =================================================== */
  document.getElementById('clearBtn').addEventListener('click', () => {
    const history = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]');
    if (history.length === 0) {
      showToast('履歴はすでに空です');
      return;
    }
    if (confirm('全ての履歴を削除しますか？\nこの操作は元に戻せません。')) {
      localStorage.removeItem(LS_HISTORY);
      renderHistory();
      showToast('🗑️ 履歴を削除しました');
    }
  });

  /* ===================================================
     タブ切り替え
  =================================================== */
  function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tabId);
    });
    document.querySelectorAll('.tab-panel').forEach(panel => {
      panel.classList.toggle('active', panel.id === `tab-${tabId}`);
    });
    if (tabId === 'history') renderHistory();
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  /* ===================================================
     初期化
  =================================================== */
  renderMenu();
  timerRestoreAll();
</script>
</body>
</html>
